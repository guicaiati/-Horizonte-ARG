<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Horizonte: Gaucho Revancha - Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Horizonte: Gaucho Revancha</h1>
  <canvas id="gameCanvas" width="1280" height="720"></canvas>
  <div id="ui" style="display:none;">
    <span id="health">Salud: 100/100</span>
    <span id="mate" style="margin-left:20px;">Mate: 3</span>
  </div>
  <div id="controls" style="display:none;">
    <canvas id="controlsCanvas" width="700" height="400"></canvas>
  </div>
  <div id="characters" style="display:none;">
    <canvas id="charsCanvas" width="750" height="550"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
